<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IBIS Mail Cockpit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/cockpit.css" />
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="logo-shine-wrap"><img class="ibis-logo" src="./assets/ibis-logo.jpg" alt="IBISWorld"></div>
      <div class="divider"></div>
      <span class="header-title">Mail Cockpit · Daniel Starr · US Major Markets</span>
    </div>
    <div class="header-right">
      <div class="mode-switch">
        <a class="mode-seg" href="../?nosplash=1" title="Switch to the dashboard">📊 Dashboard</a>
        <a class="mode-seg active">📧 Mail</a>
      </div>
      <span id="status" class="status-pill">loading…</span>
      <span class="ro-pill">👁 read-only</span>
    </div>
  </header>

  <div class="cockpit">
    <aside class="sidebar">
      <div class="acct-search">
        <input id="acct-filter" type="text" placeholder="search accounts…" autocomplete="off" />
      </div>
      <div id="nav" class="nav"></div>
    </aside>
    <main class="mainpane">
      <div id="filterbar" class="filterbar"></div>
      <div id="list-title" class="list-title"></div>
      <div id="list" class="list"></div>
    </main>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
